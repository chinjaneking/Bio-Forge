# Bio-Forge DeerFlow Configuration
# Adapted for Bio-Forge multi-agent enzyme design workflows

# ============================================================================
# Config Version
# ============================================================================
config_version: 3

# ============================================================================
# Logging
# ============================================================================
log_level: info

# ============================================================================
# Token Usage Tracking
# ============================================================================
token_usage:
  enabled: true

# ============================================================================
# Models Configuration
# ============================================================================
# Configure LLM models for Bio-Forge agents

models:
  # Primary model for complex reasoning
  - name: claude-sonnet-4-20250514
    display_name: Claude Sonnet 4
    use: langchain_anthropic:ChatAnthropic
    model: claude-sonnet-4-20250514
    api_key: $ANTHROPIC_API_KEY
    max_tokens: 16384
    temperature: 0.7

  # Fast model for simple tasks
  - name: claude-3-5-haiku-20241022
    display_name: Claude 3.5 Haiku
    use: langchain_anthropic:ChatAnthropic
    model: claude-3-5-haiku-20241022
    api_key: $ANTHROPIC_API_KEY
    max_tokens: 8192
    temperature: 0.7

  # OpenAI fallback
  - name: gpt-4o-mini
    display_name: GPT-4o Mini
    use: langchain_openai:ChatOpenAI
    model: gpt-4o-mini
    api_key: $OPENAI_API_KEY
    max_tokens: 8192
    temperature: 0.7

  # DeepSeek for cost-effective reasoning
  - name: deepseek-chat
    display_name: DeepSeek Chat
    use: langchain_openai:ChatOpenAI
    model: deepseek-chat
    api_key: $DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    max_tokens: 8192
    temperature: 0.7

# ============================================================================
# Tool Groups Configuration
# ============================================================================
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash
  - name: bioforge
  - name: research

# ============================================================================
# Tools Configuration
# ============================================================================
tools:
  # Web search tool
  - name: web_search
    group: web
    use: deerflow.community.tavily.tools:web_search_tool
    max_results: 5

  # Web fetch tool
  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  # File operations tools
  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  # Bash execution tool
  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

# ============================================================================
# Tool Search Configuration
# ============================================================================
tool_search:
  enabled: false

# ============================================================================
# Sandbox Configuration
# ============================================================================
sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider

# ============================================================================
# Skills Configuration
# ============================================================================
skills:
  container_path: /mnt/skills

# ============================================================================
# Title Generation Configuration
# ============================================================================
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

# ============================================================================
# Summarization Configuration
# ============================================================================
summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null

# ============================================================================
# Memory Configuration
# ============================================================================
memory:
  enabled: true
  storage_path: data/deerflow/memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

# ============================================================================
# Checkpointer Configuration
# ============================================================================
checkpointer:
  type: sqlite
  connection_string: data/deerflow/checkpoints.db

# ============================================================================
# Guardrails Configuration (disabled for Bio-Forge)
# ============================================================================
guardrails:
  enabled: false